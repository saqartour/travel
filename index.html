<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Georgia Travel Forum • Sakartvelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading { font-family: 'Playfair Display', Georgia, serif; }
        .section { display: none; }
        .section.active { display: block; }
        .nav-active { color: #0f766e; font-weight: 600; border-bottom: 3px solid #0f766e; }
        .premium-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .premium-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-teal-700 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-mountain text-white"></i>
                </div>
                <span class="font-semibold text-2xl">Georgia Travel <span class="text-teal-700">Forum</span></span>
            </div>

            <div class="flex items-center gap-x-8 text-sm">
                <button onclick="showSection('forum')" class="nav-active px-4 py-2" id="nav-forum">Forum</button>
                <button onclick="showSection('live-chat')" class="px-4 py-2" id="nav-live-chat">Live Chat</button>
                <button onclick="showSection('wallet')" class="px-4 py-2" id="nav-wallet">Wallet</button>
                <button onclick="showSection('profile')" class="px-4 py-2" id="nav-profile">Profile</button>
            </div>

            <div id="user-nav"></div>
        </div>
    </nav>

    <!-- FORUM SECTION -->
    <div id="forum" class="section active max-w-7xl mx-auto px-6 pt-8">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-4xl font-semibold heading">Community Discussions</h1>
                <p class="text-slate-600 mt-1">Honest conversations from travelers across the Caucasus</p>
            </div>
            <button onclick="showCreateThreadModal()" class="bg-teal-700 hover:bg-teal-800 transition px-6 py-3 rounded-3xl text-white font-medium flex items-center gap-x-2">
                <i class="fa-solid fa-plus"></i> <span>New Thread</span>
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow border border-slate-200">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                <span class="font-semibold">All Threads</span>
            </div>
            <div id="threads-list" class="divide-y"></div>
        </div>
    </div>

    <!-- LIVE CHAT SECTION (Categorized by Region) -->
    <div id="live-chat" class="section max-w-5xl mx-auto px-6 pt-8">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-3xl font-semibold">Live Regional Chat</h2>
                <p class="text-slate-600">Talk with travelers in real-time by region</p>
            </div>
        </div>

        <!-- Chat Category Tabs -->
        <div class="flex gap-2 mb-4 flex-wrap" id="chat-categories">
            <!-- Populated by JS -->
        </div>

        <div class="bg-white rounded-3xl shadow border flex flex-col h-[620px]">
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50"></div>

            <div class="p-4 border-t bg-white rounded-b-3xl">
                <div class="flex gap-3">
                    <input id="chat-input" type="text" placeholder="Type your message..." 
                           class="flex-1 border border-slate-200 rounded-3xl px-5 py-3 text-sm"
                           onkeypress="if (event.key === 'Enter') sendChatMessage()">
                    <button onclick="sendChatMessage()" class="bg-teal-700 text-white px-8 rounded-3xl font-medium">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- WALLET SECTION -->
    <div id="wallet" class="section max-w-4xl mx-auto px-6 pt-8">
        <h2 class="text-3xl font-semibold mb-6">Your Wallet & Points</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Balance Card -->
            <div class="bg-white rounded-3xl p-8 shadow border">
                <div class="text-sm text-slate-500">Wallet Balance</div>
                <div class="text-5xl font-semibold mt-2">$<span id="wallet-balance">0</span></div>
            </div>

            <!-- Points Card -->
            <div class="bg-white rounded-3xl p-8 shadow border">
                <div class="text-sm text-slate-500">Your Points</div>
                <div class="text-5xl font-semibold mt-2 text-teal-700"><span id="points-balance">0</span> pts</div>
            </div>
        </div>

        <!-- Crypto Top-up -->
        <div class="bg-white rounded-3xl p-8 shadow border mt-6">
            <h3 class="font-semibold mb-4">Top Up with Cryptocurrency</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="topup-amount" type="number" value="50" class="border rounded-2xl px-4 py-3">
                <select id="crypto-type" class="border rounded-2xl px-4 py-3">
                    <option value="USDT">USDT (TRC20)</option>
                    <option value="BTC">Bitcoin</option>
                    <option value="ETH">Ethereum</option>
                </select>
                <button onclick="topUpWallet()" class="bg-teal-700 text-white rounded-2xl font-medium">Top Up</button>
            </div>
        </div>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profile" class="section max-w-2xl mx-auto px-6 pt-8">
        <h2 class="text-3xl font-semibold mb-6">Your Profile</h2>
        <div id="profile-content" class="bg-white rounded-3xl p-8 shadow border"></div>
    </div>

    <!-- Modals -->
    <!-- Registration Modal -->
    <div id="register-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100]">
        <div class="bg-white w-full max-w-md mx-4 rounded-3xl p-8">
            <h3 class="text-2xl font-semibold mb-6">Create Account</h3>
            
            <div class="space-y-4">
                <input id="reg-username" type="text" placeholder="Choose username" class="w-full border rounded-2xl px-4 py-3">
                <input id="reg-referral" type="text" placeholder="Referral code (optional)" class="w-full border rounded-2xl px-4 py-3">
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="hideRegisterModal()" class="flex-1 py-3 border rounded-3xl">Cancel</button>
                <button onclick="registerUser()" class="flex-1 py-3 bg-teal-700 text-white rounded-3xl">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== DATA ====================
        let currentUser = JSON.parse(localStorage.getItem('gtf_user')) || null;
        let threads = JSON.parse(localStorage.getItem('gtf_threads')) || [];
        let chatMessages = JSON.parse(localStorage.getItem('gtf_chat')) || [];
        let currentChatCategory = 'General';

        const chatChannel = new BroadcastChannel('gtf_live_chat');

        function saveAll() {
            localStorage.setItem('gtf_user', JSON.stringify(currentUser));
            localStorage.setItem('gtf_threads', JSON.stringify(threads));
            localStorage.setItem('gtf_chat', JSON.stringify(chatMessages));
        }

        // ==================== REAL-TIME CHAT (Categorized) ====================
        function initChat() {
            chatChannel.onmessage = (event) => {
                if (event.data.type === 'new_message' && event.data.category === currentChatCategory) {
                    chatMessages.push(event.data.message);
                    saveAll();
                    renderChatMessages();
                }
            };

            renderChatCategories();
            renderChatMessages();
        }

        function renderChatCategories() {
            const container = document.getElementById('chat-categories');
            const categories = ['General', 'Tbilisi', 'Batumi', 'Mountains', 'Armenia', 'Azerbaijan'];
            
            container.innerHTML = categories.map(cat => 
                `<button onclick="switchChatCategory('${cat}')" class="px-4 py-2 text-sm rounded-3xl border ${cat === currentChatCategory ? 'bg-teal-700 text-white' : 'bg-white'}">${cat}</button>`
            ).join('');
        }

        function switchChatCategory(category) {
            currentChatCategory = category;
            renderChatCategories();
            renderChatMessages();
        }

        function renderChatMessages() {
            const container = document.getElementById('chat-messages');
            const filtered = chatMessages.filter(m => m.category === currentChatCategory);

            container.innerHTML = filtered.map(msg => {
                const isMine = currentUser && msg.username === currentUser.username;
                return `
                    <div class="flex ${isMine ? 'justify-end' : ''}">
                        <div class="max-w-[75%] ${isMine ? 'bg-teal-700 text-white' : 'bg-white border'} rounded-3xl px-5 py-3">
                            <div class="flex items-center gap-x-2 mb-1">
                                <span class="font-semibold text-sm">${msg.username}</span>
                            </div>
                            <div>${msg.message}</div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            if (!currentUser) { alert("Please log in"); return; }
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            const newMsg = {
                id: Date.now(),
                username: currentUser.username,
                message: message,
                category: currentChatCategory,
                timestamp: new Date().toISOString()
            };

            chatMessages.push(newMsg);
            saveAll();
            chatChannel.postMessage({ type: 'new_message', message: newMsg, category: currentChatCategory });
            renderChatMessages();
            input.value = '';
        }

        // ==================== REGISTRATION WITH REFERRAL ====================
        function showRegisterModal() {
            document.getElementById('register-modal').classList.remove('hidden');
            document.getElementById('register-modal').classList.add('flex');
        }

        function hideRegisterModal() {
            document.getElementById('register-modal').classList.remove('flex');
            document.getElementById('register-modal').classList.add('hidden');
        }

        function registerUser() {
            const username = document.getElementById('reg-username').value.trim();
            const referral = document.getElementById('reg-referral').value.trim();

            if (!username) return alert("Username is required");

            currentUser = {
                id: Date.now(),
                username: username,
                points: 50,
                wallet: 0,
                referralCode: 'REF' + Date.now().toString().slice(-6),
                referredBy: referral || null,
                verifiedLevel: 1
            };

            // Give bonus points if used referral
            if (referral) {
                currentUser.points += 30;
            }

            saveAll();
            hideRegisterModal();
            updateUserNav();
            alert("Account created successfully! Welcome to the community.");
        }

        function updateUserNav() {
            const container = document.getElementById('user-nav');
            if (!currentUser) {
                container.innerHTML = `
                    <button onclick="showRegisterModal()" class="bg-teal-700 text-white px-6 py-2 rounded-3xl text-sm font-medium">Join Free</button>
                `;
            } else {
                container.innerHTML = `
                    <div class="flex items-center gap-x-3">
                        <div onclick="showSection('profile')" class="cursor-pointer text-right">
                            <div class="font-semibold">${currentUser.username}</div>
                            <div class="text-xs text-teal-700">${currentUser.points} pts</div>
                        </div>
                        <button onclick="logout()" class="text-red-500 text-sm">Logout</button>
                    </div>
                `;
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('gtf_user');
            updateUserNav();
            location.reload();
        }

        // ==================== INITIALIZATION ====================
        function init() {
            updateUserNav();
            initChat();

            // Demo threads
            if (threads.length === 0) {
                threads = [
                    { id: 1, title: "Best value hotels in Tbilisi old town 2026?", category: "Hotels & Stays", author: "maria_travels", points: 156, approved: true, created_at: new Date().toISOString() }
                ];
                saveAll();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
