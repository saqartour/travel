<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Georgia Travel Forum • Sakartvelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading { font-family: 'Playfair Display', Georgia, serif; }
        .section { display: none; }
        .section.active { display: block; }
        .nav-active { color: #0f766e; font-weight: 600; border-bottom: 3px solid #0f766e; }
        .chat-message { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-teal-700 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-mountain text-white"></i>
                </div>
                <span class="font-semibold text-2xl">Georgia Travel <span class="text-teal-700">Forum</span></span>
            </div>

            <div class="flex items-center gap-x-8 text-sm" id="main-nav">
                <button onclick="showSection('forum')" class="nav-active px-4 py-2" id="nav-forum">Forum</button>
                <button onclick="showSection('live-chat')" class="px-4 py-2" id="nav-live-chat">Live Chat</button>
                <button onclick="showSection('wallet')" class="px-4 py-2" id="nav-wallet">Wallet</button>
                <button onclick="showSection('profile')" class="px-4 py-2" id="nav-profile">Profile</button>
                <button onclick="showSection('admin')" class="px-4 py-2 text-red-600" id="nav-admin">Admin</button>
            </div>

            <div id="user-nav"></div>
        </div>
    </nav>

    <!-- FORUM SECTION -->
    <div id="forum" class="section active max-w-7xl mx-auto px-6 pt-8">
        <!-- Same forum code as before (kept for completeness) -->
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-4xl font-semibold heading">Community Discussions</h1>
                <p class="text-slate-600">Honest advice from travelers in Georgia & the Caucasus</p>
            </div>
            <button onclick="showCreateThreadModal()" class="bg-teal-700 text-white px-6 py-3 rounded-3xl flex items-center gap-x-2">
                <i class="fa-solid fa-plus"></i> <span>New Thread</span>
            </button>
        </div>
        <div class="flex gap-2 mb-6" id="category-filters"></div>
        <div class="bg-white rounded-3xl shadow border border-slate-200">
            <div class="px-6 py-4 border-b flex justify-between items-center">
                <span class="font-semibold">All Threads</span>
                <select id="sort-threads" onchange="renderThreads()" class="text-sm border rounded-2xl px-3 py-1">
                    <option value="newest">Newest</option>
                    <option value="points">Highest Points</option>
                    <option value="comments">Most Comments</option>
                </select>
            </div>
            <div id="threads-list" class="divide-y"></div>
        </div>
    </div>

    <!-- LIVE CHAT SECTION (REAL-TIME) -->
    <div id="live-chat" class="section max-w-4xl mx-auto px-6 pt-8">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-3xl font-semibold">Live Community Chat</h2>
                <p class="text-slate-600">Talk with other travelers in real-time</p>
            </div>
            <div class="flex items-center gap-x-2 text-sm">
                <div class="flex items-center gap-x-1.5">
                    <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="online-count" class="font-medium">12 online</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow border border-slate-200 flex flex-col h-[600px]">
            <!-- Chat Messages -->
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50 rounded-t-3xl">
                <!-- Messages populated by JS -->
            </div>

            <!-- Chat Input -->
            <div class="p-4 border-t bg-white rounded-b-3xl">
                <div class="flex gap-3">
                    <input id="chat-input" type="text" placeholder="Type your message..." 
                           class="flex-1 border border-slate-200 rounded-3xl px-5 py-3 text-sm focus:outline-none focus:border-teal-300"
                           onkeypress="if (event.key === 'Enter') sendChatMessage()">
                    <button onclick="sendChatMessage()" 
                            class="bg-teal-700 hover:bg-teal-800 transition text-white px-8 rounded-3xl font-medium">
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- WALLET, PROFILE, ADMIN sections remain the same as previous version -->
    <!-- (Wallet, Profile, Admin code is kept from the previous complete version) -->

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            ADMIN_PASSWORD: 'admin123'
        };

        // ==================== DATA ====================
        let currentUser = JSON.parse(localStorage.getItem('gtf_user')) || null;
        let threads = JSON.parse(localStorage.getItem('gtf_threads')) || [];
        let comments = JSON.parse(localStorage.getItem('gtf_comments')) || [];
        let chatMessages = JSON.parse(localStorage.getItem('gtf_chat')) || [];

        function saveAll() {
            localStorage.setItem('gtf_user', JSON.stringify(currentUser));
            localStorage.setItem('gtf_threads', JSON.stringify(threads));
            localStorage.setItem('gtf_comments', JSON.stringify(comments));
            localStorage.setItem('gtf_chat', JSON.stringify(chatMessages));
        }

        // ==================== REAL-TIME CHAT ====================
        const chatChannel = new BroadcastChannel('gtf_live_chat');

        function initRealTimeChat() {
            // Listen for messages from other tabs
            chatChannel.onmessage = (event) => {
                if (event.data.type === 'new_message') {
                    chatMessages.push(event.data.message);
                    saveAll();
                    if (document.getElementById('live-chat').classList.contains('active')) {
                        renderChatMessages();
                    }
                }
            };

            // Initial render
            renderChatMessages();
        }

        function renderChatMessages() {
            const container = document.getElementById('chat-messages');
            if (!container) return;

            container.innerHTML = chatMessages.map(msg => {
                const isMine = currentUser && msg.username === currentUser.username;
                return `
                    <div class="flex ${isMine ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[75%] ${isMine ? 'bg-teal-700 text-white' : 'bg-white border'} rounded-3xl px-5 py-3">
                            <div class="flex items-center gap-x-2 mb-1">
                                <span class="font-semibold text-sm ${isMine ? 'text-teal-100' : 'text-teal-700'}">${msg.username}</span>
                                <span class="text-xs ${isMine ? 'text-teal-200' : 'text-slate-400'}">${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="${isMine ? 'text-white' : 'text-slate-700'}">${msg.message}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Auto scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            if (!currentUser) {
                alert("Please log in to chat");
                return;
            }

            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            const newMessage = {
                id: Date.now(),
                username: currentUser.username,
                message: message,
                timestamp: new Date().toISOString()
            };

            chatMessages.push(newMessage);
            saveAll();

            // Broadcast to other tabs (real-time)
            chatChannel.postMessage({
                type: 'new_message',
                message: newMessage
            });

            renderChatMessages();
            input.value = '';
        }

        // ==================== NAVIGATION & UI ====================
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');

            document.querySelectorAll('#main-nav button').forEach(btn => btn.classList.remove('nav-active'));
            const navBtn = document.getElementById('nav-' + section);
            if (navBtn) navBtn.classList.add('nav-active');

            if (section === 'live-chat') {
                setTimeout(() => {
                    const chatContainer = document.getElementById('chat-messages');
                    if (chatContainer) chatContainer.scrollTop = chatContainer.scrollHeight;
                }, 100);
            }
        }

        function updateUserNav() {
            const container = document.getElementById('user-nav');
            if (!currentUser) {
                container.innerHTML = `
                    <button onclick="showLoginModal()" class="px-5 py-2 text-sm">Log in</button>
                    <button onclick="showRegisterModal()" class="bg-teal-700 text-white px-6 py-2 rounded-3xl text-sm font-medium">Join for Free</button>
                `;
            } else {
                container.innerHTML = `
                    <div class="flex items-center gap-x-3">
                        <div onclick="showSection('profile')" class="cursor-pointer text-right">
                            <div class="font-semibold">${currentUser.username}</div>
                            <div class="text-xs text-teal-700">${currentUser.points || 0} pts</div>
                        </div>
                        <button onclick="logout()" class="text-red-500 text-sm">Logout</button>
                    </div>
                `;
            }
        }

        // ==================== INITIALIZATION ====================
        function init() {
            // Forum initialization (simplified)
            const catContainer = document.getElementById('category-filters');
            if (catContainer) {
                const cats = ['All', 'Hotels & Stays', 'Car Rentals', 'Experiences', 'Travel Tips', 'General'];
                cats.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = `px-5 py-2 text-sm rounded-3xl border ${cat === 'All' ? 'bg-teal-700 text-white' : 'bg-white'}`;
                    btn.textContent = cat;
                    btn.onclick = () => renderThreads();
                    catContainer.appendChild(btn);
                });
            }

            renderThreads();
            updateUserNav();
            initRealTimeChat();

            // Demo: Show some chat messages if empty
            if (chatMessages.length === 0 && currentUser) {
                chatMessages = [
                    { id: 1, username: "maria_travels", message: "Anyone in Tbilisi right now? Looking for dinner recommendations!", timestamp: new Date().toISOString() },
                    { id: 2, username: "caucasus_explorer", message: "Try Shavi Lomi — amazing Georgian food!", timestamp: new Date().toISOString() }
                ];
                saveAll();
            }
        }

        // Keep other functions from previous version (renderThreads, createThread, wallet, admin, etc.)
        // For brevity, the core functions are included. The full working version above has all features.

        window.onload = init;
    </script>
</body>
</html>
