# Render Blueprint — free tier: https://saqartour-travel.onrender.com
# Dashboard → New → Blueprint → connect github.com/saqartour/travel

services:
  - type: web
    name: saqartour-travel
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: Saqartour <saqartour@gmail.com>
      - key: ADMIN_EMAIL
        value: saqartour@gmail.com
      - key: ADMIN_USERNAME
        value: saqartour_admin
      - key: ADMIN_PASSWORD
        sync: false