name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set. Skipping Render deploy."
            echo "Add your Render deploy hook in GitHub: Settings → Secrets → RENDER_DEPLOY_HOOK_URL"
            exit 0
          fi
          echo "Triggering Render deploy..."
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Deploy triggered successfully."